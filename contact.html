    <main>
      <div class="container my-4">
        <h2 class="my-3">İletişime Geç</h2>
        <div class="row g-2">
          <div>
            <div class="card bg-dark">
              <div class="card-body">
                <div class="alert alert-warning text-center">Lütfen Formu Doldurun(E-posta uygulamanız açılır)</div>
                <form id="contactForm" class="row g-3 text-white">

                  <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" class="form-control">
                  </div>

                  <div class="col-md-6">
                    <label for="name" class="form-label">Ad</label>
                    <input type="text" name="name" id="name" class="form-control">
                  </div>

                  <div class="col-md-12">
                    <label for="subject" class="form-label">Konu</label>
                    <textarea name="subject" id="subject" class="form-control" rows="1"></textarea>
                  </div>

                  <div class="col-md-12">
                    <label for="message" class="form-label">Mesaj</label>
                    <textarea name="message" id="message" class="form-control" rows="3"></textarea>
                  </div>

                  <div class="col-12">
                    <button type="submit" class="btn btn-outline-warning" style="width: 100%;">Mesajı yolla</button>
                  </div>

                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>



    <header>

    </header>



<footer class="py-5 bg-dark text-white mt-auto">
  <div class="container text-center">

  </div>
</footer>


<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Sayfanın yenilenmesini durdur

    // 1. Formdaki bilgileri alalım
    const ad = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const konu = document.getElementById('subject').value;
    const mesaj = document.getElementById('message').value;

    // 2. Senin e-posta adresin
    const benimEpostam = "semih.kutlu.777@gmail.com";

    // 3. E-posta gövdesini (Body) oluşturalım
    // %0D%0A kodu e-postada alt satıra geçmek için kullanılır
    const mailGovdesi = `Gönderen: ${ad}%0D%0A` +
                        `E-posta: ${email}%0D%0A%0D%0A` +
                        `Mesaj:%0D%0A${mesaj}`;

    // 4. E-postayı tetikle
    window.location.href = `mailto:${benimEpostam}?subject=${encodeURIComponent(konu)}&body=${mailGovdesi}`;
});
</script>
